  <body>   
    
    <section id="pricing">
      <div class="main-text">Preusmerjam v aplikacijo <a id="app-link" href="https://evelope.app">evelope.app</a> ...</div>
    </section>

    <script type="text/javascript">
      window.addEventListener("load", (event) => {
        const destinationUrl = window.EvelopeAttribution && window.EvelopeAttribution.buildEvelopeAppUrl
          ? window.EvelopeAttribution.buildEvelopeAppUrl()
          : "https://evelope.app";
        const appLink = document.getElementById("app-link");
        if (appLink) {
          appLink.href = destinationUrl;
        }

        setTimeout(function() {
          window.location.href = destinationUrl;
        }, 100);
      });
    </script>
